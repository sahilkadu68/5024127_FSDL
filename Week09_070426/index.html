<!DOCTYPE html>
<html lang="en" ng-app="myApp">
<head>
    <meta charset="UTF-8">
    <title>AngularJS Greeting</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            width: 300px;
        }
        h2 {
            margin-bottom: 20px;
            color: #333;
        }
        input {
            width: 90%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            outline: none;
        }
        input:focus {
            border-color: #667eea;
        }
        .output {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            color: #444;
        }
    </style>
</head>
<body ng-controller="myController">
<div class="card">
    <h2>AngularJS Greeting</h2>
    <input type="text" ng-model="name" placeholder="Enter your name">
    <div class="output">
        Hello, {{ name || 'Guest' }} 👋
    </div>
</div>
<script>
    var app = angular.module("myApp", []);
    app.controller("myController", function($scope) {
        $scope.name = "";
    });
</script>
</body>
</html>
